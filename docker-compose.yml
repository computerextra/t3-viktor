version: "3.5"

services:
  app:
    image: viktor:1
    restart: unless-stopped
    container_name: viktor
    volumes:
      - viktor-data:/app
    ports:
      - "8888:3000"
    networks:
      - viktor-network
    command: ["bun run build && bun run start"]

volumes:
  viktor-data:

networks:
  viktor-network:
    driver: bridge
